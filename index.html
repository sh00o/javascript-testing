<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Font Switcher</title>

  <!-- load the font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: #111;
      color: white;
      font-family: serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
    }

    #text {
      font-size: 32px;
      transition: 0.3s ease;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #333;
      color: white;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }

    button:hover {
      background: #444;
    }

    /* class for the montserrat font */
    .mont {
      font-family: 'Montserrat Alternates', sans-serif;
    }
  </style>
</head>

<body>

  <p id="text">this is normal text</p>
  <button id="btn">change font</button>

  <script>
    const text = document.getElementById("text");
    const btn = document.getElementById("btn");

    btn.onclick = () => {
      text.classList.toggle("mont");
    };
  </script>

</body>
</html>
